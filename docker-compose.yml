services:
  ollama:
    image: ollama/ollama:latest
    container_name: local-llm-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-10m}
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ollama-data:
